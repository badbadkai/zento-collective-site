<svg width="280" height="48" viewBox="0 0 280 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Monogram Mark - Minimal G with integrated R -->
  <g transform="translate(0, 4)">
    <!-- Outer circle representing G -->
    <circle cx="20" cy="20" r="18" stroke="#1a1a1a" stroke-width="2.5" fill="none"/>
    <!-- G crossbar -->
    <path d="M20 20H32" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- R diagonal accent -->
    <path d="M20 20L30 32" stroke="#D4A853" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Wordmark -->
  <text x="52" y="32" font-family="Georgia, 'Cormorant Garamond', serif" font-size="22" font-weight="600" fill="#1a1a1a" letter-spacing="0.12em">GREENRIDGE</text>
</svg>